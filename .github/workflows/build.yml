name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet google-genai pillow

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile Native Android APK
        run: |
          # Clean build command for headless environments
          flet build apk --output build_out --yes

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swapnil_AI_Search-APK
          # FIX: Double asterisk searches all generated sub-directories automatically to find any matching .apk
          path: build_out/**/*.apk
