name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet google-genai pillow

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Toolchain Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Force Accept Android SDK Licenses
        run: |
          # Automatically signs and approves all Android compiler developer agreements
          mkdir -p ${ANDROID_HOME}/licenses
          echo -e "\n244d2d9e8db56d2134db972d7b3f1f85514f7e8b" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" >> ${ANDROID_HOME}/licenses/android-sdk-license
          echo -e "\n2523027-linux" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

      - name: Compile Native Android Application Package
        env:
          PUB_CACHE: ${{ github.workspace }}/.pub_cache
          FLET_SDK_PATH: ${{ github.workspace }}/.flet_sdk
        run: |
          # The --no-config flag uses our explicitly passed environment paths
          flet build apk --output build_out --no-config

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swapnil_AI_Search-APK
          path: build_out/apk/app-release.apk
