name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet google-genai pillow

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Compile Mobile APK Package
        env:
          # Force compiler parameters inside explicit local working directories
          PUB_CACHE: ${{ github.workspace }}/.pub_cache
          FLET_SDK_PATH: ${{ github.workspace }}/.flet_sdk
        run: |
          # --no-config tells flet to use local directories and bypass root system locks
          flet build apk --output build_out --no-config

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swapnil_AI_Search-APK
          path: build_out/apk/app-release.apk
